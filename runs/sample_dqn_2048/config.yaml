seed: 42
run_name: sample_dqn_2048

env:
  invalid_move_penalty: 2.0
  empty_cell_weight: 0.1
  max_tile_weight: 0.01

training:
  episodes: 10
  max_steps_per_episode: 200
  batch_size: 32
  gamma: 0.99
  learning_rate: 0.001
  replay_capacity: 1000
  learning_starts: 32
  train_every: 1
  target_update_interval: 50
  checkpoint_interval: 5
  metrics_window: 5

agent:
  hidden_sizes: [64, 64]
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 500

paths:
  runs_dir: runs
